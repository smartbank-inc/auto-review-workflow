name: Auto Review Evaluation

on:
  workflow_call:
    inputs:
      config:
        description: "YAML文字列で設定を指定（未指定時はデフォルトルール）"
        required: false
        default: ""
        type: string
      team-slug:
        description: "チェック対象のGitHub Teamスラッグ"
        required: false
        default: "developer"
        type: string
      org:
        description: "GitHub Organization名"
        required: false
        default: "smartbank-inc"
        type: string
      label-name:
        description: "レビュー不要ラベル名"
        required: false
        default: "auto-review"
        type: string
      skip-actors:
        description: "スキップするbot actor（カンマ区切り）"
        required: false
        default: "dependabot[bot],renovate[bot],devin-ai-integration[bot]"
        type: string
    secrets:
      app-id:
        description: "GitHub App ID"
        required: true
      app-private-key:
        description: "GitHub App 秘密鍵"
        required: true

jobs:
  evaluate:
    # bot除外・author判定はJS側で pull_request.user.login を使用
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # ラベル・コメント・レビュー操作は GitHub App トークン経由で実行するため、
    # GITHUB_TOKEN の permissions は最小限に設定
    permissions:
      contents: read

    steps:
      - name: Checkout auto-review-workflow
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: smartbank-inc/auto-review-workflow
          path: .auto-review

      - name: GitHub App トークン生成
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.app-private-key }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd .auto-review && npm ci

      - name: PR リスク評価・ラベル管理
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          INPUT_CONFIG: ${{ inputs.config }}
          INPUT_TEAM_SLUG: ${{ inputs.team-slug }}
          INPUT_ORG: ${{ inputs.org }}
          INPUT_LABEL_NAME: ${{ inputs.label-name }}
          INPUT_SKIP_ACTORS: ${{ inputs.skip-actors }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { evaluate } = require('./.auto-review/src/evaluate.js');
            await evaluate({
              github,
              context,
              core,
              inputs: {
                configString: process.env.INPUT_CONFIG,
                teamSlug: process.env.INPUT_TEAM_SLUG,
                org: process.env.INPUT_ORG,
                labelName: process.env.INPUT_LABEL_NAME,
                skipActors: process.env.INPUT_SKIP_ACTORS.split(',').map(s => s.trim()),
              },
            });
